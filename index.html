<head>
    <meta charset="UTF-8">

    <title>Typing Ranks Pro</title>
    <style>
        :root { 
            --sidebar-width: 260px;
            --primary: #2563eb; 
            --sidebar-bg: #1e293b;
            --bg: #f1f5f9; 
            --error-red: #ef4444;
            --key-bg: #ffffff;
            --key-text: #475569;
            --key-border: #cbd5e1;
            /* Finger Zone Colors */
    --lp: #ffcfcf; --lr: #ffdfcf; --lm: #ffffcf; --li: #cfcfcf; /* Left: Pinky, Ring, Middle, Index */
    --ri: #d0f0fd; --rm: #e0e0ff; --rr: #f0e0ff; --rp: #ffe0f5; /* Right: Index, Middle, Ring, Pinky */
    --thumb: #f1f5f9; /* Thumb (Space) */
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; width: 100vw; background: var(--bg); overflow: hidden; }

        /* Sidebar & Layout */
        #sidebar { width: var(--sidebar-width); min-width: var(--sidebar-width); background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 1000; }
        #sidebar-header { padding: 25px 15px; font-size: 1.1rem; font-weight: 800; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        #close-sidebar { display: none; background:none; border:none; color:white; cursor:pointer; font-size:1.4rem; }
        #rank-list { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        .rank-item { padding: 14px 20px; cursor: pointer; font-size: 0.9rem; color: #cbd5e1; border-left: 4px solid transparent; white-space: nowrap; }
        .rank-item.active { background: #0f172a; color: white; border-left: 4px solid var(--primary); }
        #menu-btn { display: none; position: fixed; top: 15px; left: 15px; background: var(--sidebar-bg); color: white; border: none; padding: 10px 12px; border-radius: 8px; cursor: pointer; z-index: 900; font-size: 1.2rem; }
        #sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 950; }

        /* Main Game Area */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; height: 100vh; min-width: 0; }
        #stats-bar { margin-top: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 20px; background: white; padding: 10px 30px; border-radius: 50px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: 700; flex-shrink: 0; }
        .stat-val { color: var(--primary); margin-left: 5px; }

        /* Typing Display */
        #display-container { 
    width: 100%; 
    max-width: 850px; 
    flex: 1; 
    background: white; 
    padding: 30px 40px; 
    border-radius: 15px; 
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
    overflow-y: auto; 
    position: relative;
    transition: mask-image 0.3s;
}

/* This class will be added/removed via JavaScript */
.faded {
    mask-image: linear-gradient(to bottom, 
        transparent 0%, 
        black var(--top-fade, 0%), 
        black var(--bottom-fade, 100%), 
        transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, 
        transparent 0%, 
        black var(--top-fade, 0%), 
        black var(--bottom-fade, 100%), 
        transparent 100%);
}
        #display { width: 100%; font-family: 'Courier New', Courier, monospace; line-height: 2.2; color: #94a3b8; font-size: 1.8rem; text-align: left; }
        .word-block { display: inline-block; white-space: nowrap; margin-right: 0.3em; }
        .char { position: relative; }
        .char.correct:not(.missed) { color: #1e293b; }
        .char.correct.missed { color: var(--error-red); text-decoration: underline; }
        .char.current { background: #dbeafe; color: #1e293b; outline: 2px solid var(--primary); border-radius: 2px; }

/* --- THE CONSTRAINED KEYBOARD BACKER --- */
#keyboard-container { 
    display: none; 
    flex-direction: column; 
    gap: 0.5%; /* Using % for gaps keeps the math tight */
    background: #cbd5e1; 
    padding: 12px; 
    border-radius: 12px; 
    width: 100%; 
    max-width: 850px; 
    margin: 20px auto; 
    flex-shrink: 0; 
    box-sizing: border-box; /* Crucial: padding won't expand the width */
}

.kb-row { 
    display: flex; 
    gap: 0.5%; 
    width: 100%; 
    margin-bottom: 4px; 
}

/* Standard Letter Key: The "1u" base */
.key { 
    background: var(--key-bg); 
    border-radius: 6px; 
    height: 44px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 0.8rem; 
    font-weight: 600; 
    color: var(--key-text); 
    box-shadow: 0 3px 0 #94a3b8; 
    text-transform: lowercase;
    flex: 1; /* All standard keys share equal space */
    min-width: 0; 
    position: relative;
    padding-bottom: 5px;
}

/* --- ROW-SPECIFIC OVERRIDES (Percentages of total 100% width) --- */

/* Row 1: Backspace is large */
.key-back { flex: 2; } 

/* Row 2: Tab (1.5u) and Backslash (1.25u) */
.key-tab { flex: 1.5; }
#key-\\ { flex: 1.25; }

/* Row 3: Launcher/Search (1.75u) and Enter (2.25u) */
.key-search { flex: 2; font-size: 1.1rem; }
.key-enter { flex: 2; }

/* Row 4: Shift-L (2.25u) and Shift-R (2.75u) */
/* These ratios align 'B' and 'N' near the center-point */
.key-shift-l { flex: 2.50; }
.key-shift-r { flex: 2.50; }

/* Row 5: The Bottom Row (The "B" alignment anchor) */
/* Row 5: Independent Bottom Row Modifiers */
#ctrl-l { flex: 1.50; } /* Left Control */
#alt-l  { flex: 1.50; } /* Left Alt */

.key-space { flex: 5.50; } /* Space Bar Anchor */

#alt-r  { flex: 1.90; } /* Right Alt (Slightly smaller for D-pad room) */
#ctrl-r { flex: 1.90; } /* Right Control (Slightly smaller for D-pad room) */

    /* This selector is strong enough to override the !important finger colors */
.key.active-key, 
.kb-row .key.active-key { 
    background-color: var(--primary) !important; 
    color: white !important; 
    transform: translateY(2px); 
    box-shadow: none; 
}

/* Ensure the finger label (LP, LR, etc.) turns white when the key is active for better contrast */
.key.active-key::before {
    color: rgba(255, 255, 255, 0.8) !important;
}

        #hidden-input { position: absolute; opacity: 0; pointer-events: none; }

        @media (max-width: 950px) {
            #menu-btn { display: block; }
            #close-sidebar { display: block; }
            #sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            #sidebar-overlay.active { display: block; }
            #stats-bar { margin-top: 60px; }
            #display { font-size: 1.4rem; }
        }

/* Tactile Homing Bumps for F and J */

.key::before {
    content: attr(data-finger);
    position: absolute;
    bottom: 2px;
    left: 4px;
    font-size: 0.55rem;
    color: #94a3b8;
    font-weight: 800;
    opacity: 0.7;
}

#key-f, #key-j {
    position: relative;
}

#key-f::after, #key-j::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 35%;
    width: 30%;
    height: 3px;
    background: #888585; /* Subtle ridge color */
    border-radius: 10px;
}

/* Video Placeholder Styling */
#video-placeholder {
    display: none;
    width: 100%;
    height: 100%;
    background: #000;
    border-radius: 10px;
    color: white;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    flex-direction: column;
    gap: 15px;
}

/* Color Classes */
.lp { background-color: var(--lp) !important; }
.lr { background-color: var(--lr) !important; }
.lm { background-color: var(--lm) !important; }
.li { background-color: var(--li) !important; }
.ri { background-color: var(--ri) !important; }
.rm { background-color: var(--rm) !important; }
.rr { background-color: var(--rr) !important; }
.rp { background-color: var(--rp) !important; }
.th { background-color: var(--thumb) !important; }

/* Sidebar Shield Styles */
.rank-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 15px;
    cursor: pointer;
    transition: all 0.2s;
    color: #cbd5e1; /* Light text for readability */
}

.rank-shield {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
    box-shadow: 0 0 4px rgba(0,0,0,0.4);
}

.rank-item.active {
    background: rgba(255, 255, 255, 0.1);
    color: white;
    font-weight: 600;
}

/* Video Responsive Container */
#video-placeholder {
    width: 100%;
    max-width: 800px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}
    </style>

const dictionary = [

    "don't", "it's", "can't", "stop!", "run?", "wait:", "fast-track", "well-done", "he's", "she's", "really?", "help!"

const ranks = ["Beginner 1", "Beginner 2", "Beginner 3", "Beginner 4", "Intermediate 1", "Intermediate 2", "Intermediate 3", "Advanced 1", "Advanced 2", "Advanced 3", "Professional 1", "Professional 2", "Professional 3", "Master 1", "Master 2", "Master 3"];
const showKbRanks = ["Beginner 2", "Beginner 3", "Beginner 4", "Intermediate 1", "Intermediate 2", "Advanced 3", "Professional 3", "Master 2"];

const leftHandKeys = ['q', 'w', 'e', 'r', 't', 'a', 's', 'd', 'f', 'g', 'z', 'x', 'c', 'v', 'b', '1', '2', '3', '4', '5', '!', '@', '#', '$', '%', '`', '~'];
const rightHandKeys = ['y', 'u', 'i', 'o', 'p', 'h', 'j', 'k', 'l', ';', 'n', 'm', ',', '.', '/', '6', '7', '8', '9', '0', '^', '&', '*', '(', ')', '-', '=', '_', '+', '[', ']', '{', '}', '|', ':', '"', '<', '>', '?'];
const shiftLayerMap = { '!': '1', '@': '2', '#': '3', '$': '4', '%': '5', '^': '6', '&': '7', '*': '8', '(': '9', ')': '0', '_': '-', '+': '=', '{': '[', '}': ']', '|': '\\', ':': ';', '"': "'", '<': ',', '>': '.', '?': '/' };

const sidebar = document.getElementById('sidebar'), display = document.getElementById('display'), input = document.getElementById('hidden-input'), kbContainer = document.getElementById('keyboard-container');
let currentIndex = 0, text = "", currentRank = "", startTime = null, timerInterval = null, timeLeft = 60, errorIndices = new Set();

function getLessonContent(rank) {
    // 1. If it's a timed test, the startLesson function handles it from rankTests
    if (rankTests[rank]) return ""; 

    const allRanks = Object.keys(rankRegistry);
    const rankIdx = allRanks.indexOf(rank);
    
    // 2. Build the "Already Learned" key set
    let oldKeys = [];
    for (let i = 0; i < rankIdx; i++) {
        const keys = rankRegistry[allRanks[i]];
        if (Array.isArray(keys)) {
            oldKeys = oldKeys.concat(keys.filter(k => k !== "SHIFT"));
        }
    }

    // 3. SPECIAL HANDLING: Intermediate 1 (Capitalization)
    if (rank === "Intermediate 1") {
        let words = dictionary.filter(w => w.split('').every(c => oldKeys.includes(c.toLowerCase())));
        let selected = [];
        for(let i=0; i<20; i++) {
            let w = words[Math.floor(Math.random() * words.length)];
            if (Math.random() > 0.5) w = w.charAt(0).toUpperCase() + w.slice(1);
            selected.push(w);
        }
        return selected.join(' ');
    }

    // 4. GENERAL PRACTICE LOGIC (Intermediate 2, Beginner 2-4, etc.)
    const newKeys = rankRegistry[rank] || [];
    let combinedKeys = [...newKeys, ...oldKeys];
    
    // Find words that use the new keys
    let priorityWords = dictionary.filter(word => 
        word.split('').every(char => combinedKeys.includes(char.toLowerCase())) &&
        word.split('').some(char => newKeys.includes(char.toLowerCase()))
    );

    // 5. Build the intro sequence (The "jj ff" drills)
    let intro = generateSequence(newKeys, 10);
    
    // 6. Build the practice words
    let practice = [];
    for(let i=0; i<15; i++) {
        if (priorityWords.length > 0) {
            practice.push(priorityWords[Math.floor(Math.random() * priorityWords.length)]);
        } else {
            // FALLBACK: If no dictionary words fit the symbols (like in Intermediate 2),
            // generate random 3-character drills using the new keys
            let drill = "";
            const cleanNew = newKeys.filter(k => k.length === 1 && k !== " ");
            for(let j=0; j<3; j++) drill += cleanNew[Math.floor(Math.random() * cleanNew.length)];
            practice.push(drill);
        }
    }
    
    return (intro + " " + practice.join(' ')).trim();
}

function generateSequence(keys, length) {
    if (!keys || keys.length === 0) return "";
    let s = "";
    const clean = keys.filter(k => k.length === 1 && k !== " ");
    for (let i = 0; i < length; i++) {
        s += clean[Math.floor(Math.random() * clean.length)];
        if (i % 2 === 1) s += " ";
    }
    return s.trim();
}

function startLesson(rank, element) {
    if (timerInterval) clearInterval(timerInterval);
    document.querySelectorAll('.rank-item').forEach(i => i.classList.remove('active'));
    if (element) element.classList.add('active');
    
    currentRank = rank;
    const videoPlaceholder = document.getElementById('video-placeholder');
    const displayElement = document.getElementById('display');
    const fingerIndicator = document.getElementById('finger-indicator');

    // NEW: If no rank is selected, show the Landing Page
    if (!rank) {
    displayElement.innerHTML = `
        <div style="text-align: center; color: #64748b; max-width: 600px; margin: 0 auto;">
            <h2 style="color: #1e293b; margin-bottom: 10px; font-size: 1.5rem;">Welcome to Typing Ranks!</h2>
            <p style="margin: 5px 0;">Select a rank on the left to begin your journey,</p>
            <p style="margin: 5px 0;">or <strong>press any key</strong> to see which finger you should use.</p>
        </div>`;
    videoPlaceholder.style.display = 'none';
    displayElement.style.display = 'block';
    kbContainer.style.display = 'flex';
    fingerIndicator.innerText = "Waiting for keypress...";
    return;
}

    fingerIndicator.innerText = "";

    if (rank === "Beginner 1") {
        text = "fjfj fjf jfjf fdkj ddkj ffff jjjj kkkk fjd kjf dddd";
        displayElement.style.display = 'none';
        videoPlaceholder.style.display = 'flex';
        // Inject the YouTube Embed
        videoPlaceholder.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/CMlO9X1NOyk?si=V3YrW7Wfa-lDLgqz" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>`;
    } else {
        videoPlaceholder.style.display = 'none';
        videoPlaceholder.innerHTML = ""; // Clear video when switching ranks
        displayElement.style.display = 'block';
        
        if (rank === "Master 2") {
            kbContainer.style.display = 'none'; // ADD THIS LINE
            setupMaster2Mission(0);
            return;
        }
        
        if (rankTests[rank]) {
            const testPool = rankTests[rank];
            text = testPool[Math.floor(Math.random() * testPool.length)];
        } else {
            text = getLessonContent(rank);
        }
    }

    // Reset stats and render
    currentIndex = 0; errorIndices.clear(); startTime = null;
    timeLeft = 60;
    document.getElementById('timer').innerText = timeLeft;
    document.getElementById('wpm').innerText = "0";
    document.getElementById('acc').innerText = "100";
    kbContainer.style.display = showKbRanks.includes(rank) ? 'flex' : 'none';

    renderDisplay();
    highlightKey();
    input.focus();
}

// 1. Add this right above your input.addEventListener block
document.addEventListener('keydown', (e) => {
    // 1. Track keys for Easter Eggs
    typingBuffer += e.key.toLowerCase();
    if (typingBuffer.length > 10) typingBuffer = typingBuffer.slice(-10);

    const eggs = {
        "lol": "You're funny! 😂",
        "jk": "Kidding? Are you sure? 😉"
        //"hi": "Hello, how are you too? 😉"
    };

    for (let key in eggs) {
        if (typingBuffer.endsWith(key)) {
            alert(eggs[key]);
        }
    }

    // 2. Sandbox Mode (Landing Page)
    if (!currentRank) {
        let keyName = e.key.toLowerCase();
        const code = e.code.toLowerCase(); // Use 'code' to distinguish Left/Right keys
        
        // Map special keys to our IDs
        if (e.key === " ") keyName = " ";
        else if (e.key === "Meta") keyName = "meta";
        else if (["Shift", "Control", "Alt", "Enter", "Backspace"].includes(e.key)) {
            keyName = code.replace('key', ''); // Becomes 'shiftleft', 'controlright', etc.
        }

        const finger = fingerMap[e.key.toLowerCase()];
        if (finger) {
            const indicator = document.getElementById('finger-indicator');
            if (indicator) indicator.innerText = finger;
        }

        const keyEl = document.getElementById(`key-${keyName}`);
        if (keyEl) {
            keyEl.classList.add('active-key');
            setTimeout(() => keyEl.classList.remove('active-key'), 200);
        }
    }
});

input.addEventListener('input', (e) => {
    if (!text || currentIndex >= text.length || input.disabled) return;
    
    if (!startTime) {
        startTime = new Date();
        // ONLY start the countdown if the rank is in the rankTests object
        if (rankTests[currentRank]) {
            startTimer();
        }
    }

    const charTyped = e.target.value.slice(-1);
    if (charTyped === text[currentIndex]) {
        currentIndex++;
    } else {
        errorIndices.add(currentIndex);
    }
    
    e.target.value = "";
    renderStats();
    renderDisplay();
    highlightKey();

    if (currentIndex >= text.length) {
        clearInterval(timerInterval);
        alert(`Finished! WPM: ${calculateWPM()} | ACC: ${document.getElementById('acc').innerText}%`);
    }
});

function startTimer() {
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            input.disabled = true;
            alert(`Time is up! Final WPM: ${calculateWPM()}`);
        }
    }, 1000);
}

function highlightKey() {
    document.querySelectorAll('.key').forEach(k => k.classList.remove('active-key'));
    if (currentIndex < text.length) {
        const char = text[currentIndex];
        let targetKeyId = char.toLowerCase();
        if (shiftLayerMap[char]) targetKeyId = shiftLayerMap[char];
        
        const keyEl = document.getElementById(`key-${targetKeyId === ' ' ? ' ' : targetKeyId}`);
        if (keyEl) keyEl.classList.add('active-key');

        if (/[A-Z]/.test(char) || "~!@#$%^&*()_+{}|:\"<>?".includes(char)) {
            const side = leftHandKeys.includes(char.toLowerCase()) ? 'key-right-shift' : 'key-left-shift';
            document.getElementById(side).classList.add('active-key');
        }
    }
}

function renderDisplay() {
    let globalIdx = 0;
    const words = text.split(' ');
    
    display.innerHTML = words.map(word => {
        let wordHtml = `<div class="word-block">`;
        word.split('').forEach(char => {
            wordHtml += `<span class="char ${getCharState(globalIdx++)}">${char}</span>`;
        });
        // Handle the space after the word
        if (globalIdx < text.length) {
            wordHtml += `<span class="char ${getCharState(globalIdx++)}">&nbsp;</span>`;
        }
        wordHtml += `</div>`;
        return wordHtml;
    }).join('');

    // --- AUTO-SCROLL LOGIC ---
    const currentEl = display.querySelector('.current');
    if (currentEl) {
        currentEl.scrollIntoView({
            behavior: 'smooth', // Makes it slide instead of jump
            block: 'center'      // Keeps the active line in the vertical middle
        });
    }
}

function getCharState(i) {
    if (i < currentIndex) return errorIndices.has(i) ? "correct missed" : "correct";
    return (i === currentIndex) ? "current" : "";
}

function calculateWPM() {
    if (!startTime || currentIndex === 0) return 0;
    const timeElapsed = (new Date() - startTime) / 60000;
    return Math.round((currentIndex / 5) / timeElapsed) || 0;
}

function renderStats() {
    document.getElementById('wpm').innerText = calculateWPM();
    const acc = currentIndex === 0 ? 100 : Math.round(((currentIndex - errorIndices.size) / currentIndex) * 100);
    document.getElementById('acc').innerText = Math.max(0, acc);
}

function restartLesson() { if (currentRank) startLesson(currentRank, null); }
function toggleSidebar() { sidebar.classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('active'); }

let currentMissionIndex = 0;

function renderMissionUI(mission) {
    if (mission.type === "choice") {
        return `
            <div style="display: grid; gap: 10px; margin-top: 10px;">
                ${mission.options.map(opt => `
                    <button class="quiz-opt" onclick="checkQuizAnswer('${opt}')" 
                        style="padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; background: white; cursor: pointer; text-align: left; font-weight: 600; transition: all 0.2s;">
                        ${opt}
                    </button>
                `).join('')}
            </div>
        `;
    }
    switch(mission.id) {
        case "select_copy_paste":
            return `
                <textarea id="m-source" readonly style="width: 100%; height: 60px; margin-bottom: 10px; padding: 8px;">${mission.setup.source}</textarea>
                <textarea id="m-target" placeholder="Paste here..." style="width: 100%; height: 60px; margin-bottom: 10px; padding: 8px;"></textarea>
                <button id="m-submit" style="padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer;">Submit</button>
            `;
        case "backspace_word":
            return `
                <p style="font-size: 0.9rem; color: #64748b;">Try it: Hold Ctrl and tap Backspace once.</p>
                <input type="text" id="m-input" value="${mission.setup.text}" style="width: 100%; padding: 12px; font-size: 1.2rem; border: 1px solid #cbd5e1;">
            `;
        case "caps_lock":
            return `
                <p id="caps-status" style="font-size: 0.8rem; color: #ef4444;">Caps Lock: OFF</p>
                <input type="text" id="m-input" placeholder="Type STOP here..." style="width: 100%; padding: 12px; font-size: 1.2rem; border: 1px solid #cbd5e1;">
            `;
        default:
            return `<p>Mission loading...</p>`;
    }
}

// Logic injection for each mission
function setupMaster2Mission(index) {
    if (index >= master2Missions.length) {
        showFeedback("ALL MISSIONS COMPLETE!", "#22c55e");
        setTimeout(() => startLesson("Master 3", null), 2000);
        return;
    }

    currentMissionIndex = index;
    const mission = master2Missions[index];
    const display = document.getElementById('display');
    
    display.innerHTML = `
        <div class="mission-container" style="font-family: sans-serif; font-size: 1rem; color: #1e293b; text-align: left;">
            <p style="margin-bottom: 15px;"><strong>Mission ${index + 1}:</strong> ${mission.instruction}</p>
            <div id="mission-workspace" style="border: 2px dashed #cbd5e1; padding: 20px; border-radius: 8px; background: #f8fafc;">
                ${renderMissionUI(mission)}
            </div>
            <div id="mission-feedback" style="margin-top: 10px; font-weight: bold; color: #ef4444; height: 20px;"></div>
        </div>
    `;

    // MISSION-SPECIFIC LISTENERS
    if (mission.id === "select_copy_paste") {
        document.getElementById('m-submit').onclick = () => {
            const state = { target: document.getElementById('m-target').value, source: document.getElementById('m-source').value, focused: document.activeElement.id === 'm-submit' ? 'submit' : '' };
            if (mission.validate(state)) { showFeedback("Success!", "#22c55e"); setTimeout(() => setupMaster2Mission(index + 1), 1000); }
            else { showFeedback("Check your paste and use TAB to reach the button!"); }
        };
    }

    if (mission.id === "backspace_word") {
        const inp = document.getElementById('m-input');
        inp.focus();
        inp.oninput = () => {
            if (mission.validate({ text: inp.value })) {
                showFeedback("Word deleted! Correct.", "#22c55e");
                setTimeout(() => setupMaster2Mission(index + 1), 1000);
            }
        };
    }

    if (mission.id === "caps_lock") {
        const inp = document.getElementById('m-input');
        inp.focus();
        inp.onkeyup = (e) => {
            const isCaps = e.getModifierState("CapsLock");
            document.getElementById('caps-status').innerText = `Caps Lock: ${isCaps ? "ON" : "OFF"}`;
            document.getElementById('caps-status').style.color = isCaps ? "#22c55e" : "#ef4444";
            
            if (mission.validate({ typed: inp.value })) {
                showFeedback("STOP! Mission Complete.", "#22c55e");
                setTimeout(() => setupMaster2Mission(index + 1), 1000);
            }
        };
    }
}

function showFeedback(msg, color = "#ef4444") {
    const fb = document.getElementById('mission-feedback');
    if (fb) {
        fb.innerText = msg;
        fb.style.color = color;
    }
}

function checkQuizAnswer(answer) {
    const mission = master2Missions[currentMissionIndex];
    if (answer === mission.correct) {
        showFeedback("Correct!", "#22c55e");
        setTimeout(() => setupMaster2Mission(currentMissionIndex + 1), 1000);
    } else {
        showFeedback("Not quite. Try again!");
        // Optional: shake the button or highlight red
    }
}
startLesson(null, null);

function updateFadeEffect() {
    const container = document.getElementById('display-container');
    const { scrollTop, scrollHeight, clientHeight } = container;
    
    // If text is too short to scroll, remove the effect entirely
    if (scrollHeight <= clientHeight) {
        container.classList.remove('faded');
        return;
    }

    container.classList.add('faded');
    
    // Calculate top fade: if at top (0), fade is 0%. If scrolled down, fade is 15%.
    const topFade = scrollTop > 10 ? "15%" : "0%";
    // Calculate bottom fade: if at bottom, fade is 100%. If more to scroll, fade is 85%.
    const bottomFade = (scrollTop + clientHeight >= scrollHeight - 10) ? "100%" : "85%";

    container.style.setProperty('--top-fade', topFade);
    container.style.setProperty('--bottom-fade', bottomFade);
}

// Attach the listener
document.getElementById('display-container').addEventListener('scroll', updateFadeEffect);
